<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI News Anchor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-10">
    <div class="max-w-xl mx-auto bg-gray-900 p-8 rounded-xl border border-gray-800">
        <h1 class="text-2xl font-bold mb-4 text-blue-500">🎙️ AI News Anchor</h1>
        <input type="text" id="topic" placeholder="What's the news?" class="w-full p-2 bg-gray-800 rounded mb-4">
        <button onclick="getNews()" id="btn" class="bg-blue-600 px-4 py-2 rounded font-bold w-full">Generate Script</button>
        <div id="output" class="mt-6 text-gray-300 italic whitespace-pre-line"></div>
    </div>

    <script>
        async function getNews() {
            const topic = document.getElementById('topic').value;
            const output = document.getElementById('output');
            output.innerText = "Connecting to global satellites...";
            
            const res = await fetch('/summarize', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({topic: topic})
            });
            const data = await res.json();
            output.innerText = data.summary || data.error;
        }
    </script>
</body>
</html>
